name: npm-publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no actual publish)"
        required: false
        default: true
        type: boolean

concurrency:
  group: npm-publish-${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}

env:
  DRY_RUN: ${{ github.event_name == 'release' && '0' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.dry_run && '1' || '0')) || '1' }}

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      (github.event_name == 'release' && 
       startsWith(github.event.release.tag_name, 'v') && 
       !github.event.release.prerelease) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release artifacts
        run: |
          VERSION="$(./scripts/get-version.sh)"
          mkdir -p releases/$VERSION

          # Download release artifacts from GitHub release
          gh release download "$VERSION" \
            --repo ${{ github.repository }} \
            --dir releases/$VERSION \
            --pattern "appz-*.tar.gz" \
            --pattern "appz-*.zip" || {
              echo "Failed to download release artifacts"
              exit 1
            }

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Create npm package
        run: |
          mkdir -p npm-package
          cd npm-package
          
          # Create package.json
          VERSION="$(../scripts/get-version.sh | sed 's/^v//')"
          cat > package.json << EOF
          {
            "name": "@appz/appz",
            "version": "${VERSION}",
            "description": "A Rust task runner CLI with Deployer-like recipes",
            "bin": {
              "appz": "./bin/appz"
            },
            "repository": {
              "type": "git",
              "url": "https://github.com/yourusername/appz.git"
            },
            "keywords": ["cli", "devtools", "task-runner"],
            "license": "MIT",
            "os": ["darwin", "linux", "win32"],
            "cpu": ["x64", "arm64"]
          }
          EOF

          # Extract binaries from release artifacts
          mkdir -p bin
          for file in ../releases/$VERSION/*.tar.gz; do
            tar -xzf "$file" -C /tmp
            find /tmp -name appz -type f -exec cp {} bin/appz-$(basename "$file" .tar.gz) \;
          done
          for file in ../releases/$VERSION/*.zip; do
            unzip -q "$file" -d /tmp
            find /tmp -name appz.exe -type f -exec cp {} bin/appz-$(basename "$file" .zip).exe \;
          done

      - name: Publish npm package
        run: |
          cd npm-package
          if [[ ${DRY_RUN:-0} != 1 ]]; then
            npm publish --access public
          else
            echo "DRY RUN: Would publish npm package"
            npm pack
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

