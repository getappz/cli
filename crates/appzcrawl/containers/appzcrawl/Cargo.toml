[workspace]
resolver = "2"
members = [
    "crates/native",
    "crates/search",
    "crates/server",
    "crates/wasm",
    "crates/worker-server",
]
default-members = [
    "crates/native",
    "crates/search",
    "crates/server",
]

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.48", features = ["macros", "rt-multi-thread"] }
regex = "1.11"
url = "2.5"
reqwest = { version = "0.12", features = ["json"] }
scraper = "0.22"
rand = "0.8"
urlencoding = "2.1"
base64 = "0.22.1"

[profile.release]
lto = true
strip = "symbols"
