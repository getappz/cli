[package]
authors = ["Firecrawl"]
edition = "2021"
name = "firecrawl_rs"
version = "0.1.0"

[lib]
crate-type = ["rlib"]

[features]
default = ["native", "pdf"]
native = ["dep:tokio"]
pdf = ["dep:lopdf", "dep:pdf-extract"]

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
kuchikiki = "0.8.2"
# lol_html = "2.6.0"
lopdf = { git = "https://github.com/J-F-Liu/lopdf", rev = "6ee84c30f9226d6752dc8e1892298c9d46ac3eb6", optional = true }
pdf-extract = { version = "0.10", optional = true }
maud = "0.27.0"
nodesig = { git = "https://github.com/firecrawl/nodesig" }
psl = "2.1.140"
quick-xml = "0.36"
roxmltree = "0.20.0"
strsim = "0.11"
texting_robots = "0.2.2"
zip = { version = "5.0.0", default-features = false, features = ["deflate"] }
calamine = "0.26"
cfb = "0.10"

# Workspace shared dependencies
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, optional = true }
regex = { workspace = true }
url = { workspace = true }
