[package]
name = "firecrawl-wasm"
version = "0.1.0"
edition = "2021"

[package.metadata.wasm-pack.profile.release]
# Disable bundled wasm-opt (too old for bulk memory ops).
# We run a system wasm-opt separately for size optimization.
wasm-opt = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
firecrawl_rs = { path = "../native", default-features = false }
wasm-bindgen = "0.2"
serde = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }
getrandom = { version = "0.3", features = ["wasm_js"] }
