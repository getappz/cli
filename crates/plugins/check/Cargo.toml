[package]
name = "check-plugin"
version = "0.1.0"
edition = "2021"
publish = false
description = "WASM plugin for code checking with linting and AI-assisted fixes"

[lib]
crate-type = ["cdylib"]

[dependencies]
appz_pdk = { path = "../../appz_pdk" }
extism-pdk = "1.4.0"
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0"
