[package]
name = "crawl-plugin"
version = "0.1.0"
edition = "2021"
description = "WASM plugin for scraping and crawling URLs to markdown"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
crawl-core = { path = "../../crawl-core" }
htmd = "0.1"
appz_pdk = { path = "../../appz_pdk" }
extism-pdk = "1.4.0"
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0"
url = { workspace = true }