[package]
name = "ssg-migrator-plugin"
version = "0.1.0"
edition = "2021"
publish = false
description = "WASM plugin entry point for the SSG Migrator"

[lib]
crate-type = ["cdylib"]

[dependencies]
appz_pdk = { path = "../../appz_pdk" }
ssg-migrator = { path = "../../ssg-migrator", default-features = false, features = ["wasm"] }
extism-pdk = "1.4.0"
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0"
