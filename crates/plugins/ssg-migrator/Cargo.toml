[package]
name = "ssg-migrator-plugin"
version = "0.1.0"
edition = "2021"
license.workspace = true
publish = false
description = "WASM plugin entry point for the SSG Migrator"

[lib]
crate-type = ["cdylib"]

[dependencies]
# The ssg-migrator crate with default-features=false (no walkdir/git2/ast-grep).
# Biome parsing crates are always compiled, so the plugin gets full analysis/transform
# capabilities running inside the WASM module.
ssg-migrator = { path = "../../ssg-migrator", default-features = false }
appz_pdk = { path = "../../appz_pdk" }
extism-pdk = "1.4.0"
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0"
camino = "1.2"
miette = { workspace = true }
