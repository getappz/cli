# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# unmaintained: none | transitive | workspace | all
unmaintained = "workspace"
yanked = "deny"

[bans]
multiple-versions = "warn"
# Skip crates that commonly have multiple versions due to transitive deps
skip = [
    { crate = "windows-sys" },
    { crate = "windows-targets" },
]
# Deny specific crates if needed
# deny = []

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-3-Clause" ]
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
