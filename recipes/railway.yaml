config:
  # Railway project name (optional, will use directory name if not set)
  project_name: ""
  # Railway service name (optional)
  service_name: ""
  # Build command
  build_command: "npm run build"
  # Start command (for production)
  start_command: "npm start"
  # Railway token (set via RAILWAY_TOKEN env var or config)
  railway_token: ""

tools:
  railway: "latest"

tasks:
  build:
    - desc: "Build the project"
      run_locally: "{{build_command}}"

  deploy:
    - desc: "Deploy to Railway"
      run_locally: "railway up"

  deploy:production:
    - desc: "Deploy to production on Railway"
      run_locally: "railway up --service {{service_name}}"

before:
  deploy:
    - build
  deploy:production:
    - build

  railway:init:
    - desc: "Initialize Railway project"
      run_locally: "railway init"

  railway:login:
    - desc: "Login to Railway"
      run_locally: "railway login"

  railway:link:
    - desc: "Link to existing Railway project"
      run_locally: "railway link"

  railway:env:list:
    - desc: "List environment variables"
      run_locally: "railway variables"

  railway:env:set:
    - desc: "Set environment variable (set RAILWAY_ENV_KEY and RAILWAY_ENV_VALUE)"
      run_locally: "railway variables set {{RAILWAY_ENV_KEY}}={{RAILWAY_ENV_VALUE}}"

  railway:logs:
    - desc: "View deployment logs"
      run_locally: "railway logs"

  railway:open:
    - desc: "Open Railway dashboard in browser"
      run_locally: "railway open"

