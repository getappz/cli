config:
  # Render service ID (required)
  service_id: ""
  # Render API key (set via RENDER_API_KEY env var or config)
  render_api_key: ""
  # Build command
  build_command: "npm run build"
  # Start command (for production)
  start_command: "npm start"
  # Environment (production, staging)
  environment: "production"

tools:
  render: "latest"

tasks:
  build:
    - desc: "Build the project"
      run_locally: "{{build_command}}"

  deploy:
    - desc: "Deploy to Render"
      run_locally: "render deploy"

  deploy:production:
    - desc: "Deploy to production on Render"
      run_locally: "render deploy --service {{service_id}}"

before:
  deploy:
    - build
  deploy:production:
    - build

  render:init:
    - desc: "Initialize Render service"
      run_locally: "render init"

  render:login:
    - desc: "Login to Render"
      run_locally: "render login"

  render:env:list:
    - desc: "List environment variables"
      run_locally: "render env list --service {{service_id}}"

  render:env:set:
    - desc: "Set environment variable (set RENDER_ENV_KEY and RENDER_ENV_VALUE)"
      run_locally: "render env set {{RENDER_ENV_KEY}}={{RENDER_ENV_VALUE}} --service {{service_id}}"

  render:logs:
    - desc: "View deployment logs"
      run_locally: "render logs --service {{service_id}}"

  render:status:
    - desc: "Check service status"
      run_locally: "render status --service {{service_id}}"

