config:
  # Surge domain (e.g., myapp.surge.sh)
  domain: ""
  # Build command
  build_command: "npm run build"
  # Build output directory
  build_output_dir: "dist"
  # Surge token (set via SURGE_TOKEN env var or config)
  surge_token: ""

tools:
  surge: "latest"

tasks:
  build:
    - desc: "Build the project"
      run_locally: "{{build_command}}"

  deploy:
    - desc: "Deploy to Surge.sh"
      run_locally: "surge {{build_output_dir}} {{domain}}"

  deploy:production:
    - desc: "Deploy to production on Surge.sh"
      run_locally: "surge {{build_output_dir}} {{domain}}"

  surge:domain:set:
    - desc: "Set custom domain (set SURGE_CUSTOM_DOMAIN)"
      run_locally: "surge {{build_output_dir}} {{SURGE_CUSTOM_DOMAIN}}"

  surge:list:
    - desc: "List all deployments"
      run_locally: "surge list"

  surge:teardown:
    - desc: "Remove domain from Surge (set SURGE_DOMAIN_TO_REMOVE)"
      run_locally: "surge teardown {{SURGE_DOMAIN_TO_REMOVE}}"

before:
  deploy:
    - build
  deploy:production:
    - build
